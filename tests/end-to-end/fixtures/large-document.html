<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Large Document Test - Ariadne</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 2rem 0;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }
        .form-item {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
        }
        .form-item form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-item input, .form-item select, .form-item textarea {
            padding: 0.25rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-item button {
            padding: 0.5rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background: #f5f5f5;
        }
        #output {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background: #2d3748;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            z-index: 1000;
        }
        .performance-stats {
            background: #4a5568;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Large Document Performance Test</h1>
        <p>This page contains many elements to test Ariadne's performance with large documents.</p>
        
        <div class="section">
            <h2>Multiple Forms Section</h2>
            <div class="form-grid" id="forms-container">
                <!-- Forms will be generated by JavaScript -->
            </div>
        </div>
        
        <div class="section">
            <h2>Large Data Table</h2>
            <div class="table-container">
                <table id="large-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Table rows will be generated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section">
            <h2>Navigation Links</h2>
            <div id="links-container">
                <!-- Links will be generated by JavaScript -->
            </div>
        </div>
        
        <div class="section">
            <h2>Content Sections</h2>
            <div id="content-sections">
                <!-- Content sections will be generated by JavaScript -->
            </div>
        </div>
    </div>
    
    <div id="output"></div>
    
    <script type="module">
        import { extractSemanticMap, Ariadne } from '/dist/index.js';
        
        // Generate large amounts of content
        function generateContent() {
            const output = document.getElementById('output');
            output.textContent = 'Generating content...\\n';
            
            // Generate multiple forms
            const formsContainer = document.getElementById('forms-container');
            for (let i = 1; i <= 50; i++) {
                const formDiv = document.createElement('div');
                formDiv.className = 'form-item';
                formDiv.innerHTML = `
                    <h3>Form ${i}</h3>
                    <form id="form-${i}">
                        <input type="text" name="name-${i}" placeholder="Name ${i}">
                        <input type="email" name="email-${i}" placeholder="Email ${i}">
                        <select name="category-${i}">
                            <option value="">Select Category</option>
                            <option value="type1">Type 1</option>
                            <option value="type2">Type 2</option>
                            <option value="type3">Type 3</option>
                        </select>
                        <textarea name="description-${i}" placeholder="Description ${i}"></textarea>
                        <button type="submit">Submit Form ${i}</button>
                    </form>
                `;
                formsContainer.appendChild(formDiv);
            }
            
            // Generate large table
            const tableBody = document.getElementById('table-body');
            for (let i = 1; i <= 200; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td>User ${i}</td>
                    <td>user${i}@example.com</td>
                    <td>Department ${i % 10 + 1}</td>
                    <td>${i % 3 === 0 ? 'Active' : 'Inactive'}</td>
                    <td>
                        <button onclick="editUser(${i})">Edit</button>
                        <button onclick="deleteUser(${i})">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            }
            
            // Generate many links
            const linksContainer = document.getElementById('links-container');
            for (let i = 1; i <= 100; i++) {
                const link = document.createElement('a');
                link.href = `#section-${i}`;
                link.textContent = `Section ${i}`;
                link.style.marginRight = '1rem';
                linksContainer.appendChild(link);
            }
            
            // Generate content sections
            const contentSections = document.getElementById('content-sections');
            for (let i = 1; i <= 30; i++) {
                const section = document.createElement('section');
                section.innerHTML = `
                    <h3 id="section-${i}">Section ${i}</h3>
                    <p>This is content for section ${i}. Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                    <form id="section-form-${i}">
                        <input type="text" name="section-input-${i}" placeholder="Section ${i} input">
                        <button type="submit">Submit Section ${i}</button>
                    </form>
                `;
                contentSections.appendChild(section);
            }
            
            output.textContent += `Generated content: 80 forms, 200 table rows, 100 links, 30 sections\\n`;
        }
        
        async function runPerformanceTest() {
            const output = document.getElementById('output');
            
            // Test 1: Single extraction with large document
            output.textContent += '\\n=== Test 1: Single Extraction ===\\n';
            
            const start1 = performance.now();
            const result1 = await extractSemanticMap(document, {
                tokenBudget: 15000,
                debug: false
            });
            const end1 = performance.now();
            
            output.textContent += `Duration: ${(end1 - start1).toFixed(2)}ms\\n`;
            output.textContent += `Elements: ${result1.elements.length}\\n`;
            output.textContent += `Partial: ${result1.partial}\\n`;
            if (result1.partial) {
                output.textContent += `Reason: ${result1.reason}\\n`;
            }
            
            // Test 2: Multiple extractions with same client
            output.textContent += '\\n=== Test 2: Multiple Extractions ===\\n';
            
            const client = new Ariadne({ tokenBudget: 10000, debug: false });
            const durations = [];
            
            for (let i = 0; i < 5; i++) {
                const start = performance.now();
                const result = await client.extract(document);
                const end = performance.now();
                durations.push(end - start);
                output.textContent += `Extraction ${i + 1}: ${(end - start).toFixed(2)}ms (${result.elements.length} elements)\\n`;
            }
            
            client.terminate();
            
            const avgDuration = durations.reduce((a, b) => a + b, 0) / durations.length;
            output.textContent += `Average: ${avgDuration.toFixed(2)}ms\\n`;
            
            // Test 3: Token budget limits
            output.textContent += '\\n=== Test 3: Token Budget Limits ===\\n';
            
            const budgets = [1000, 2500, 5000, 10000, 20000];
            const budgetResults = [];
            
            for (const budget of budgets) {
                const start = performance.now();
                const result = await extractSemanticMap(document, {
                    tokenBudget: budget,
                    debug: false
                });
                const end = performance.now();
                
                budgetResults.push({
                    budget,
                    duration: end - start,
                    elements: result.elements.length,
                    partial: result.partial
                });
                
                output.textContent += `Budget ${budget}: ${(end - start).toFixed(2)}ms, ${result.elements.length} elements, partial: ${result.partial}\\n`;
            }
            
            // Test 4: Memory usage simulation
            output.textContent += '\\n=== Test 4: Memory Test ===\\n';
            
            const clients = [];
            try {
                for (let i = 0; i < 10; i++) {
                    const client = new Ariadne({ tokenBudget: 5000, debug: false });
                    clients.push(client);
                    
                    const start = performance.now();
                    const result = await client.extract(document);
                    const end = performance.now();
                    
                    output.textContent += `Client ${i + 1}: ${(end - start).toFixed(2)}ms\\n`;
                }
                
                output.textContent += `Successfully created and used ${clients.length} clients\\n`;
                
            } finally {
                // Clean up all clients
                clients.forEach(client => client.terminate());
                output.textContent += `Cleaned up ${clients.length} clients\\n`;
            }
            
            // Store results for Playwright tests
            window.performanceResults = {
                singleExtraction: {
                    duration: end1 - start1,
                    elements: result1.elements.length,
                    partial: result1.partial
                },
                multipleExtractions: {
                    durations,
                    avgDuration
                },
                budgetResults,
                memoryTest: {
                    clientCount: clients.length,
                    success: true
                }
            };
            
            output.textContent += '\\n=== Performance Test Complete ===\\n';
        }
        
        // Global functions for button clicks
        window.editUser = function(id) {
            console.log(`Edit user ${id}`);
        };
        
        window.deleteUser = function(id) {
            console.log(`Delete user ${id}`);
        };
        
        // Run tests
        window.addEventListener('load', async () => {
            generateContent();
            
            // Wait a bit for DOM to settle
            await new Promise(resolve => setTimeout(resolve, 100));
            
            try {
                await runPerformanceTest();
            } catch (error) {
                const output = document.getElementById('output');
                output.textContent += `\\nError: ${error.message}\\n`;
                window.performanceError = error;
            }
        });
        
        // Prevent form submissions
        document.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('Form submission prevented');
        });
    </script>
</body>
</html>
